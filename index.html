<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finance Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <button id="toggle-theme">🌙</button>

  <h1>💰 Finance Tracker</h1>

  <h2>Your Balance</h2>
  <h3 id="balance">$0.00</h3>

  <div class="summary">
    <div>
      <h4>Income</h4>
      <p id="income">+$0.00</p>
    </div>

    <div>
      <h4>Expense</h4>
      <p id="expense">-$0.00</p>
    </div>
  </div>

  <h3>Add new transaction</h3>
  <form id="form">
    <input type="text" id="text" placeholder="Description">
    <input type="number" id="amount" placeholder="Amount">
    <button type="submit">Add transaction</button>
  </form>

  <div class="filters">
    <button onclick="filterTransactions('all')">All</button>
    <button onclick="filterTransactions('income')">Income</button>
    <button onclick="filterTransactions('expense')">Expense</button>
  </div>

  <h3>History</h3>
  <ul id="list"></ul>

  <canvas id="chart"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
